spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: devices
              uri: http://event-service:8081
              predicates:
                - Path=/api/v1/devices/**
            - id: sensor-data
              uri: http://event-service:8081
              predicates:
                - Path=/api/v1/sensor-data/**
            - id: lamp
              uri: http://presence-service:8082
              predicates:
                - Path=/api/v1/lamp/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}