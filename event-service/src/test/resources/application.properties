# ===============================
# MONGODB CONFIGURATION
# ===============================
spring.mongodb.port=${mongodb.container.port}
spring.mongodb.host=localhost

# ===============================
# APP RABBITMQ CONFIGURATION
# ===============================
app.mqtt.enabled=false
app.rabbitmq.event-queue=event-service
app.rabbitmq.esp01.availability-queue=esp-01-availability
app.rabbitmq.nodemcu.availability-queue=nodemcu-availability
app.rabbitmq.service-availability-queue=event-service-availability

# ===============================
# APP HOME ASSISTANT CONFIGURATION
# ===============================
app.ha.service-availability-topic=homeassistant/event-service/availability
app.ha.esp01.availability-topic=homeassistant/sensor/esp01/availability
app.ha.esp01.state-topic=homeassistant/sensor/esp01/state
app.ha.esp01.discovery-temp-topic=homeassistant/sensor/esp01_temp/config
app.ha.esp01.discovery-hum-topic=homeassistant/sensor/esp01_hum/config
app.ha.nodemcu.availability-topic=homeassistant/binary_sensor/nodemcu/availability
app.ha.nodemcu.state-topic=homeassistant/binary_sensor/nodemcu/state
app.ha.nodemcu.discovery-presence-topic=homeassistant/binary_sensor/nodemcu_presence/config
app.ha.nodemcu.discovery-lamp-state-topic=homeassistant/binary_sensor/nodemcu_lamp_state/config
app.ha.status-topic=homeassistant/status
app.ha.expire-after=60

# ===============================
# LOGGING CONFIGURATION
# ===============================
logging.level.dev.iot=DEBUG
