spring:
  autoconfigure:
    exclude: org.springframework.boot.amqp.autoconfigure.RabbitAutoConfiguration
  mongodb:
    host: localhost
    port: ${mongodb.container.port}

app:
  mqtt:
    enabled: false
  rabbitmq:
    event-data-queue: event-data
    device-availability-queue: device-availability
  ha:
    discovery-prefix: homeassistant
    service-availability-topic: homeassistant/event-service/availability
    status-topic: homeassistant/status
    expire-after: 60

logging:
  level:
    dev.iot: DEBUG