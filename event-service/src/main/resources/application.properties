spring.application.name=event-service

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8081

# ===============================
# RABBITMQ CONFIGURATION
# ===============================
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS}

# ===============================
# APP RABBITMQ CONFIGURATION
# ===============================
app.rabbitmq.event-queue=event-service
app.rabbitmq.availability-queue=availability

# ===============================
# APP HOME ASSISTANT CONFIGURATION
# ===============================
app.ha.service-availability-topic=homeassistant/event-service/availability
app.ha.esp-01-availability-topic=homeassistant/sensor/esp01/availability
app.ha.esp-01-state-topic=homeassistant/sensor/esp01/state
app.ha.esp-01-discovery-temp-topic=homeassistant/sensor/esp01_temp/config
app.ha.esp-01-discovery-hum-topic=homeassistant/sensor/esp01_hum/config
app.ha.status-topic=homeassistant/status

# ===============================
# LOGGING CONFIGURATION
# ===============================
logging.level.dev.iot.eventservice=DEBUG
