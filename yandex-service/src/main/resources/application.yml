spring:
  application:
    name: yandex-service

server:
  port: 8083

yandex:
  oauth-token: ${YANDEX_OAUTH_TOKEN}
  base-url: https://api.iot.yandex.net
  group-action-path: /v1.0/groups/{group_id}/actions
  chandelier-id: ${YANDEX_CHANDELIER_ID}
  connect-timeout: 3s
  read-timeout: 5s

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}