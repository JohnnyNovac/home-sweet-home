global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: event-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'event-service:8081' ]

  - job_name: presence-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'presence-service:8082' ]

  - job_name: yandex-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'yandex-service:8083' ]

  - job_name: rabbitmq
    metrics_path: /metrics/per-object
    static_configs:
      - targets: [ 'rabbitmq:15692' ]