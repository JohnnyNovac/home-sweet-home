services:
  rabbitmq:
    image: my-rabbitmq
    container_name: rabbitmq
    build:
      context: ./rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
      - "1883:1883"
    healthcheck:
      test: rabbitmq-diagnostics -q check_running
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 180s
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq-lib:/var/lib/rabbitmq/
      - rabbitmq-log:/var/log/rabbitmq
    restart: unless-stopped
    networks:
      - homesweethome_net

  # One-shot: recreates queues with current definitions, then exits.
  # Dependents wait for it via service_completed_successfully.
  rabbitmq-init:
    image: my-rabbitmq
    container_name: rabbitmq-init
    build:
      context: ./rabbitmq
    entrypoint: [ "/init.sh" ]
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    volumes:
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    restart: "no"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - homesweethome_net

  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    ports:
      - "8123:8123"
    volumes:
      - homeassistant-config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    networks:
      - homesweethome_net

  mongodb:
    image: mongodb/mongodb-community-server:4.4.29-ubuntu2004
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - homesweethome_net

  event-service:
    container_name: event-service
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: event-service/build/libs/event-service-0.0.1-SNAPSHOT.jar
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_started
    networks:
      - homesweethome_net

  presence-service:
    container_name: presence-service
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: presence-service/build/libs/presence-service-0.0.1-SNAPSHOT.jar
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_started
    networks:
      - homesweethome_net

  yandex-service:
    container_name: yandex-service
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: yandex-service/build/libs/yandex-service-0.0.1-SNAPSHOT.jar
    environment:
      - YANDEX_OAUTH_TOKEN=${YANDEX_OAUTH_TOKEN}
      - YANDEX_CHANDELIER_ID=${YANDEX_CHANDELIER_ID}
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped
    networks:
      - homesweethome_net

  # Single entry point: routes /api/v1/** to the service that owns each path.
  # The only service whose port is published; the rest stay internal to the network.
  api-gateway:
    container_name: api-gateway
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: api-gateway/build/libs/api-gateway-0.0.1-SNAPSHOT.jar
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      event-service:
        condition: service_started
      presence-service:
        condition: service_started
    networks:
      - homesweethome_net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9091:9090"
    restart: unless-stopped
    depends_on:
      - event-service
      - presence-service
      - yandex-service
      - api-gateway
    networks:
      - homesweethome_net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/home-sweet-home.json
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    networks:
      - homesweethome_net

  loki:
    image: grafana/loki:3.7.0
    container_name: loki
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - ./loki/rules:/etc/loki/rules:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - homesweethome_net

  vector:
    image: timberio/vector:0.56.0-debian
    container_name: vector
    volumes:
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      loki:
        condition: service_started
    networks:
      - homesweethome_net

  alertmanager:
    image: prom/alertmanager:v0.31.0
    container_name: alertmanager
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    entrypoint:
      - /bin/sh
      - -c
      - 'echo "$$TELEGRAM_BOT_TOKEN" > /tmp/bot_token && echo "$$TELEGRAM_CHAT_ID" > /tmp/chat_id && exec /bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    restart: unless-stopped
    networks:
      - homesweethome_net


volumes:
  rabbitmq-lib:
  rabbitmq-log:
  homeassistant-config:
  mongodb_data:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:


networks:
  homesweethome_net:
    driver: bridge

