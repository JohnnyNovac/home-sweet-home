build:
  stage: build
  script:
    - echo "Hello, $GITLAB_USER_LOGIN!"
    - docker build -f docker/Dockerfile -t my-rabbitmq .

test:
  stage: test
  script:
    - echo "This job tests something"

deploy:
  stage: deploy
  script:
    - echo "This job deploys project from the $CI_COMMIT_BRANCH branch"
    - docker compose -f docker/docker-compose.yml down
    - docker compose -f docker/docker-compose.yml up -d


