syntax = "proto3";

package yandex;

service YandexService {
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
  rpc GetState(GetStateRequest) returns (GetStateResponse);
  rpc SetState(SetStateRequest) returns (SetStateResponse);
}

message ListDevicesRequest {}

message ListDevicesResponse {
  repeated DiscoveredDevice devices = 2;
  repeated DiscoveredRoom rooms = 3;
}

message DiscoveredDevice {
  string external_id = 1;
  DeviceType type = 2;
  string name = 3;
  string room_external_id = 4;
  repeated string group_external_ids = 5;
  TargetKind kind = 6;
}

message DiscoveredRoom {
  string external_id = 1;
  string name = 2;
}

message GetStateRequest {
  string external_id = 1;
  TargetKind kind = 2;
}

message GetStateResponse {
  bool on = 1;
}

message SetStateRequest {
  string external_id = 1;
  bool on = 2;
  TargetKind kind = 3;
}

message SetStateResponse {}

enum DeviceType {
  DEVICE_TYPE_UNSPECIFIED = 0;
  LAMP = 1;
}

enum TargetKind {
  TARGET_KIND_UNSPECIFIED = 0;
  DEVICE = 1;
  GROUP = 2;
}


