spring:
  application:
    name: presence-service
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_DEFAULT_USER}
    password: ${RABBITMQ_DEFAULT_PASS}
  grpc:
    client:
      channels:
        yandex-service:
          address: yandex-service:9090

server:
  port: 8082

app:
  rabbitmq:
    presence-data-queue: presence-data
    illuminance-data-queue: presence-illuminance
  grpc:
    lamp-deadline: 8s
  lamp:
    illuminance-threshold: 50
  measurements:
    radar-presence:
      name: radarPresence
    pir-sensor-presence:
      name: pirSensorPresence
    illuminance:
      name: illuminance

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
